server:
  port: 8081

spring:
  application:
    name: user-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/steel_user_db?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  data:
    redis:
      host: localhost
      port: 6379
      password: admin
      database: 0
      timeout: 3000ms
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

login:
  rate-limit:
    enabled: true

jwt:
  interceptor:
    enabled: false

file:
  upload-url: http://127.0.0.1:8080
  download-url: http://127.0.0.1:8080/files/download
