server:
  port: 8084

spring:
  application:
    name: file-service
  data:
    redis:
      host: localhost
      port: 6379
      password: admin
      database: 0
      timeout: 3000ms
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

file:
  upload-url: http://127.0.0.1:8080
  download-url: http://127.0.0.1:8080/files/download
  storage-path: D:\steelfactory\files\
